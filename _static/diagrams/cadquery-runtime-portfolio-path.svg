<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <rect width="900" height="320" fill="#f8f9fa" rx="10"/>

  <text x="450" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">V9 CadQuery 运行与作品集路线（V9D 总入口）</text>
  <text x="450" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#666">作品集升级 → 运行诊断 → 本地环境 → STEP/STL 导出 → 作品集归档</text>

  <!-- Step 1: V9A 作品集升级 -->
  <rect x="20" y="65" width="160" height="120" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="100" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0d47a1">V9A 作品集升级</text>
  <text x="100" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">V6/V7/V8 三线整合</text>
  <text x="100" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">capstone-portfolio-upgrade</text>
  <text x="100" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">10 项自评清单</text>
  <text x="100" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">需 CadQuery 环境：否</text>
  <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-style="italic" fill="#1976d2">合并提交结构</text>

  <!-- Arrow 1 -->
  <polygon points="185,125 210,120 210,130" fill="#666"/>
  <line x1="180" y1="125" x2="210" y2="125" stroke="#666" stroke-width="2"/>

  <!-- Step 2: V9B 运行诊断 -->
  <rect x="215" y="65" width="160" height="120" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="5"/>
  <text x="295" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100">V9B 运行诊断</text>
  <text x="295" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">环境诊断 + 真实尝试</text>
  <text x="295" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">cadquery-runtime-export-pilot</text>
  <text x="295" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">6 个 .py 实际运行表</text>
  <text x="295" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">需 CadQuery 环境：否</text>
  <text x="295" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-style="italic" fill="#e65100">诚实记录结果</text>

  <!-- Arrow 2 -->
  <polygon points="380,125 405,120 405,130" fill="#666"/>
  <line x1="375" y1="125" x2="405" y2="125" stroke="#666" stroke-width="2"/>

  <!-- Step 3: V9C 本地环境 -->
  <rect x="410" y="65" width="160" height="120" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
  <text x="490" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1b5e20">V9C 本地环境</text>
  <text x="490" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#333">conda + pip 双路线</text>
  <text x="490" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">cadquery-local-env-guide</text>
  <text x="490" y="135" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">smoke_test + verify_exports</text>
  <text x="490" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">需 CadQuery 环境：是</text>
  <text x="490" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-style="italic" fill="#1b5e20">读者本地完成</text>

  <!-- Arrow 3 -->
  <polygon points="575,125 600,120 600,130" fill="#666"/>
  <line x1="570" y1="125" x2="600" y2="125" stroke="#666" stroke-width="2"/>

