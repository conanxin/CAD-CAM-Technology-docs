
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <rect width="600" height="350" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="300" y="20" font-size="14" text-anchor="middle" fill="#333" font-weight="bold">STEP vs STL 表示方式对比</text>
  
  <!-- Left: STEP representation -->
  <rect x="30" y="45" width="250" height="280" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <text x="155" y="70" font-size="13" text-anchor="middle" fill="#1976d2" font-weight="bold">STEP (B-rep)</text>
  
  <!-- Cube in STEP -->
  <polygon points="60,120 130,120 130,190 60,190" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
  <polygon points="60,120 90,90 160,90 130,120" fill="#90caf9" stroke="#1976d2" stroke-width="1.5"/>
  <polygon points="130,120 160,90 160,160 130,190" fill="#64b5f6" stroke="#1976d2" stroke-width="1.5"/>
  
  <!-- STEP description -->
  <text x="155" y="220" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">数学描述</text>
  <text x="155" y="235" font-size="9" text-anchor="middle" fill="#666">PLANE + BOUNDARY</text>
  <text x="155" y="248" font-size="9" text-anchor="middle" fill="#666">精确到浮点精度</text>
  
  <text x="155" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">6 个面定义</text>
  <text x="155" y="283" font-size="9" text-anchor="middle" fill="#666">每个面 = 平面方程 + 边界</text>
  <text x="155" y="296" font-size="9" text-anchor="middle" fill="#666">文件: ~5 KB</text>
  
  <!-- Right: STL representation -->
  <rect x="320" y="45" width="250" height="280" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="5"/>
  <text x="445" y="70" font-size="13" text-anchor="middle" fill="#e65100" font-weight="bold">STL (三角网格)</text>
  
  <!-- Cube in STL - triangulated -->
  <polygon points="350,120 420,120 420,190 350,190" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/>
  <!-- Diagonal on front face -->
  <line x1="350" y1="120" x2="420" y2="190" stroke="#f57c00" stroke-width="1" stroke-dasharray="3,3"/>
  
  <polygon points="350,120 380,90 450,90 420,120" fill="#ffcc80" stroke="#f57c00" stroke-width="1.5"/>
  <polygon points="420,120 450,90 450,160 420,190" fill="#ffb74d" stroke="#f57c00" stroke-width="1.5"/>
  
  <!-- STL description -->
  <text x="445" y="220" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">三角网格逼近</text>
  <text x="445" y="235" font-size="9" text-anchor="middle" fill="#666">FACET + VERTEX</text>
  <text x="445" y="248" font-size="9" text-anchor="middle" fill="#666">精度取决于密度</text>
  
  <text x="445" y="270" font-size="10" text-anchor="middle" fill="#333" font-weight="bold">12 个三角形</text>
  <text x="445" y="283" font-size="9" text-anchor="middle" fill="#666">每个面 = 2 个三角形</text>
  <text x="445" y="296" font-size="9" text-anchor="middle" fill="#666">文件: ~1 KB</text>
  
  <!-- Arrow between -->
  <line x1="290" y1="185" x2="310" y2="185" stroke="#666" stroke-width="2"/>
  <polygon points="308,182 315,185 308,188" fill="#666"/>
  <text x="300" y="175" font-size="9" text-anchor="middle" fill="#666">转换</text>
  <text x="300" y="200" font-size="9" text-anchor="middle" fill="#666">丢失</text>
  <text x="300" y="210" font-size="9" text-anchor="middle" fill="#666">精确性</text>
  
  <!-- Bottom note -->
  <text x="300" y="340" font-size="10" text-anchor="middle" fill="#666">STEP 精确描述 → STL 离散近似（信息丢失）</text>
</svg>
