<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <rect width="700" height="280" fill="#f8f9fa" rx="10"/>
  
  <text x="350" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">STEP 与 STL 验证重点对比</text>
  
  <!-- STEP Column -->
  <rect x="30" y="45" width="300" height="220" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <rect x="30" y="45" width="300" height="30" fill="#1976d2" rx="5"/>
  <rect x="30" y="65" width="300" height="10" fill="#1976d2"/>
  <text x="180" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">STEP 验证重点</text>
  
  <text x="45" y="95" font-family="Arial, sans-serif" font-size="11" fill="#333">✅ 实体边界完整</text>
  <text x="45" y="115" font-family="Arial, sans-serif" font-size="10" fill="#555">保留精确曲面</text>
  
  <text x="45" y="145" font-family="Arial, sans-serif" font-size="11" fill="#333">✅ 圆柱孔精确</text>
  <text x="45" y="165" font-family="Arial, sans-serif" font-size="10" fill="#555">圆柱面方程，非多边形</text>
  
  <text x="45" y="195" font-family="Arial, sans-serif" font-size="11" fill="#333">✅ 拓扑信息完整</text>
  <text x="45" y="215" font-family="Arial, sans-serif" font-size="10" fill="#555">面、边、顶点连接关系</text>
  
  <text x="45" y="245" font-family="Arial, sans-serif" font-size="11" fill="#333">✅ 适合 CAM/CAE</text>
  
  <!-- STL Column -->
  <rect x="370" y="45" width="300" height="220" fill="#ffebee" stroke="#c62828" stroke-width="2" rx="5"/>
  <rect x="370" y="45" width="300" height="30" fill="#c62828" rx="5"/>
  <rect x="370" y="65" width="300" height="10" fill="#c62828"/>
  <text x="520" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">STL 验证重点</text>
  
  <text x="385" y="95" font-family="Arial, sans-serif" font-size="11" fill="#333">✅ 三角网格密度</text>
  <text x="385" y="115" font-family="Arial, sans-serif" font-size="10" fill="#555">不过粗也不过细</text>
  
  <text x="385" y="145" font-family="Arial, sans-serif" font-size="11" fill="#333">✅ 无破洞</text>
  <text x="385" y="165" font-family="Arial, sans-serif" font-size="10" fill="#555">模型完全闭合</text>
  
  <text x="385" y="195" font-family="Arial, sans-serif" font-size="11" fill="#333">✅ 法向一致</text>
  <text x="385" y="215" font-family="Arial, sans-serif" font-size="10" fill="#555">所有面朝向外部</text>
  
  <text x="385" y="245" font-family="Arial, sans-serif" font-size="11" fill="#333">✅ 适合切片</text>
</svg>