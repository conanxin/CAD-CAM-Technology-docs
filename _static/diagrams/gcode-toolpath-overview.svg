<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <rect width="500" height="350" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="250" y="20" font-size="14" text-anchor="middle" fill="#333" font-weight="bold">刀具路径总览</text>
  
  <!-- Workpiece -->
  <rect x="150" y="80" width="200" height="160" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="250" y="170" font-size="12" text-anchor="middle" fill="#333">工件 100×80</text>
  
  <!-- Origin -->
  <circle cx="150" cy="240" r="3" fill="#d32f2f"/>
  <text x="150" y="265" font-size="9" text-anchor="middle" fill="#d32f2f">(0,0)</text>
  
  <!-- Rapid move: start to approach (green dashed) -->
  <line x1="80" y1="60" x2="130" y2="70" stroke="#4caf50" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="80" y="55" font-size="9" fill="#4caf50">起点</text>
  
  <!-- Rapid move: approach to start point -->
  <line x1="130" y1="70" x2="145" y2="75" stroke="#4caf50" stroke-width="2" stroke-dasharray="6,4"/>
  
  <!-- Cutting: down (blue) -->
  <line x1="145" y1="75" x2="150" y2="80" stroke="#2196f3" stroke-width="2.5"/>
  
  <!-- Cutting: left edge -->
  <line x1="150" y1="80" x2="150" y2="240" stroke="#2196f3" stroke-width="2.5"/>
  
  <!-- Cutting: bottom edge -->
  <line x1="150" y1="240" x2="350" y2="240" stroke="#2196f3" stroke-width="2.5"/>
  
  <!-- Cutting: right edge -->
  <line x1="350" y1="240" x2="350" y2="80" stroke="#2196f3" stroke-width="2.5"/>
  
  <!-- Cutting: top edge -->
  <line x1="350" y1="80" x2="150" y2="80" stroke="#2196f3" stroke-width="2.5"/>
  
  <!-- Retract: up (orange dashed) -->
  <line x1="150" y1="80" x2="130" y2="60" stroke="#ff9800" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Retract: to safe position -->
  <line x1="130" y1="60" x2="80" y2="60" stroke="#ff9800" stroke-width="2" stroke-dasharray="4,4"/>
  
  <!-- Tool symbol at start -->
  <circle cx="80" cy="60" r="5" fill="#666"/>
  <text x="80" y="45" font-size="9" text-anchor="middle" fill="#666">刀具</text>
  
  <!-- Legend -->
  <rect x="370" y="80" width="110" height="90" fill="#fff" stroke="#ddd" stroke-width="1" rx="3"/>
  <text x="375" y="95" font-size="10" fill="#333" font-weight="bold">图例</text>
  
  <line x1="375" y1="105" x2="400" y2="105" stroke="#4caf50" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="405" y="109" font-size="9" fill="#666">快速移动 (G0)</text>
  
  <line x1="375" y1="120" x2="400" y2="120" stroke="#2196f3" stroke-width="2.5"/>
  <text x="405" y="124" font-size="9" fill="#666">切削移动 (G1)</text>
  
  <line x1="375" y1="135" x2="400" y2="135" stroke="#ff9800" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="405" y="139" font-size="9" fill="#666">抬刀 (G0)</text>
  
  <!-- Direction arrows on cutting path -->
  <polygon points="148,160 152,160 150,168" fill="#2196f3"/>
  <polygon points="250,242 250,238 258,240" fill="#2196f3"/>
  <polygon points="352,160 348,160 350,152" fill="#2196f3"/>
  <polygon points="250,78 250,82 242,80" fill="#2196f3"/>
  
  <!-- Note -->
  <text x="250" y="320" font-size="10" text-anchor="middle" fill="#666">逆时针轮廓加工（G41 刀具半径左补偿）</text>
</svg>
