<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320">
  <rect width="700" height="320" fill="#f8f9fa" rx="10"/>
  
  <text x="350" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">支架零件尺寸图（教学示意）</text>
  
  <!-- L-Bracket shape -->
  <g transform="translate(150, 60)">
    <!-- Base -->
    <rect x="0" y="120" width="200" height="40" fill="#cfd8dc" stroke="#455a64" stroke-width="2"/>
    <!-- Vertical -->
    <rect x="0" y="20" width="40" height="140" fill="#cfd8dc" stroke="#455a64" stroke-width="2"/>
    
    <!-- Mounting holes on base -->
    <circle cx="50" cy="140" r="8" fill="#ffffff" stroke="#c62828" stroke-width="2"/>
    <circle cx="150" cy="140" r="8" fill="#ffffff" stroke="#c62828" stroke-width="2"/>
    
    <!-- Mounting hole on vertical -->
    <circle cx="20" cy="50" r="6" fill="#ffffff" stroke="#c62828" stroke-width="2"/>
    <circle cx="20" cy="100" r="6" fill="#ffffff" stroke="#c62828" stroke-width="2"/>
    
    <!-- Dimensions -->
    <!-- Length (bottom) -->
    <line x1="0" y1="180" x2="200" y2="180" stroke="#1976d2" stroke-width="1.5" marker-start="url(#arrL)" marker-end="url(#arrR)"/>
    <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1976d2">200 mm</text>
    
    <!-- Width (right) -->
    <line x1="220" y1="120" x2="220" y2="160" stroke="#1976d2" stroke-width="1.5" marker-start="url(#arrU)" marker-end="url(#arrD)"/>
    <text x="232" y="143" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1976d2">40 mm</text>
    
    <!-- Height (left) -->
    <line x1="-20" y1="20" x2="-20" y2="160" stroke="#1976d2" stroke-width="1.5" marker-start="url(#arrU)" marker-end="url(#arrD)"/>
    <text x="-30" y="93" text-anchor="end" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1976d2">140 mm</text>
    
    <!-- Thickness (right) -->
    <line x1="0" y1="175" x2="40" y2="175" stroke="#388e3c" stroke-width="1.5" marker-start="url(#arrL)" marker-end="url(#arrR)"/>
    <text x="55" y="178" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#388e3c">10 mm</text>
    
    <!-- Hole diameter -->
    <line x1="50" y1="155" x2="50" y2="170" stroke="#c62828" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="50" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Ø8</text>
    
    <line x1="20" y1="35" x2="35" y2="35" stroke="#c62828" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="38" y="38" font-family="Arial, sans-serif" font-size="9" fill="#c62828">Ø6</text>
  </g>
  
  <!-- Spec table -->
  <rect x="420" y="60" width="250" height="220" fill="#ffffff" stroke="#ccc" stroke-width="1" rx="5"/>
  <text x="545" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#333">零件规格</text>
  
  <text x="430" y="110" font-family="Arial, sans-serif" font-size="10" fill="#333">外轮廓：200 × 140 × 10 mm</text>
  <text x="430" y="130" font-family="Arial, sans-serif" font-size="10" fill="#333">形状：L 型支架</text>
  <text x="430" y="150" font-family="Arial, sans-serif" font-size="10" fill="#333">底板安装孔：2 × Ø8（间距 100mm）</text>
  <text x="430" y="170" font-family="Arial, sans-serif" font-size="10" fill="#333">立板安装孔：2 × Ø6（间距 50mm）</text>
  <text x="430" y="190" font-family="Arial, sans-serif" font-size="10" fill="#333">材料：Q235 钢（教学用）</text>
  <text x="430" y="210" font-family="Arial, sans-serif" font-size="10" fill="#333">公差：±0.1 mm</text>
  <text x="430" y="230" font-family="Arial, sans-serif" font-size="10" fill="#333">表面粗糙度：Ra 3.2</text>
  <text x="430" y="260" font-family="Arial, sans-serif" font-size="9" fill="#666" font-style="italic">注：此为教学示意尺寸，</text>
  <text x="430" y="272" font-family="Arial, sans-serif" font-size="9" fill="#666" font-style="italic">不是工业生产图纸</text>
  
  <defs>
    <marker id="arrL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#1976d2"/>
    </marker>
    <marker id="arrR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1976d2"/>
    </marker>
    <marker id="arrU" markerWidth="8" markerHeight="6" refX="3" refY="0" orient="auto">
      <polygon points="0 8, 3 0, 6 8" fill="#1976d2"/>
    </marker>
    <marker id="arrD" markerWidth="8" markerHeight="6" refX="3" refY="6" orient="auto">
      <polygon points="0 0, 3 8, 6 0" fill="#1976d2"/>
    </marker>
  </defs>
</svg>