<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280">
  <rect width="600" height="280" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="300" y="20" font-size="14" text-anchor="middle" fill="#333" font-weight="bold">CAPP 工艺路线设计流程</text>
  
  <!-- Left column: Inputs -->
  <rect x="20" y="45" width="130" height="30" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="85" y="64" font-size="10" text-anchor="middle" fill="#333">CAD 模型 / 图纸</text>
  
  <rect x="20" y="85" width="130" height="30" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="85" y="104" font-size="10" text-anchor="middle" fill="#333">生产纲领</text>
  
  <rect x="20" y="125" width="130" height="30" rx="3" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="85" y="144" font-size="10" text-anchor="middle" fill="#333">工厂资源</text>
  
  <!-- Center: CAPP Process -->
  <rect x="180" y="45" width="240" height="200" rx="5" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="300" y="62" font-size="12" text-anchor="middle" fill="#e65100" font-weight="bold">CAPP 系统</text>
  
  <!-- Steps inside CAPP -->
  <rect x="195" y="75" width="210" height="25" rx="2" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  <text x="300" y="92" font-size="9" text-anchor="middle" fill="#333">1. 零件信息输入（几何 + 工艺）</text>
  
  <rect x="195" y="107" width="210" height="25" rx="2" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  <text x="300" y="124" font-size="9" text-anchor="middle" fill="#333">2. 毛坯选择与余量计算</text>
  
  <rect x="195" y="139" width="210" height="25" rx="2" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  <text x="300" y="156" font-size="9" text-anchor="middle" fill="#333">3. 定位基准确定</text>
  
  <rect x="195" y="171" width="210" height="25" rx="2" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  <text x="300" y="188" font-size="9" text-anchor="middle" fill="#333">4. 工序排序与内容设计</text>
  
  <rect x="195" y="203" width="210" height="25" rx="2" fill="#fff" stroke="#ffcc80" stroke-width="1"/>
  <text x="300" y="220" font-size="9" text-anchor="middle" fill="#333">5. 设备 / 刀具 / 夹具选择</text>
  
  <!-- Right column: Outputs -->
  <rect x="450" y="45" width="130" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="515" y="64" font-size="10" text-anchor="middle" fill="#333">工艺路线</text>
  
  <rect x="450" y="85" width="130" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="515" y="104" font-size="10" text-anchor="middle" fill="#333">工序卡片</text>
  
  <rect x="450" y="125" width="130" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="515" y="144" font-size="10" text-anchor="middle" fill="#333">数控程序</text>
  
  <rect x="450" y="165" width="130" height="30" rx="3" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="515" y="184" font-size="10" text-anchor="middle" fill="#333">工时定额</text>
  
  <!-- Arrows from inputs to CAPP -->
  <line x1="150" y1="60" x2="180" y2="85" stroke="#666" stroke-width="1.5"/>
  <line x1="150" y1="100" x2="180" y2="120" stroke="#666" stroke-width="1.5"/>
  <line x1="150" y1="140" x2="180" y2="155" stroke="#666" stroke-width="1.5"/>
  
  <!-- Arrows from CAPP to outputs -->
  <line x1="420" y1="60" x2="450" y2="60" stroke="#666" stroke-width="1.5"/>
  <line x1="420" y1="100" x2="450" y2="100" stroke="#666" stroke-width="1.5"/>
  <line x1="420" y1="140" x2="450" y2="140" stroke="#666" stroke-width="1.5"/>
  <line x1="420" y1="180" x2="450" y2="180" stroke="#666" stroke-width="1.5"/>
  
  <!-- Bottom note -->
  <text x="300" y="265" font-size="9" text-anchor="middle" fill="#666">输出可直接用于 CAM 编程和生产管理</text>
</svg>