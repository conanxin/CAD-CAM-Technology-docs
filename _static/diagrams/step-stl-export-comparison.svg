<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 240">
  <rect width="700" height="240" fill="#f8f9fa" rx="10"/>
  
  <text x="350" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">STEP 与 STL 导出结果对比</text>
  
  <!-- STEP box -->
  <rect x="30" y="45" width="300" height="180" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
  <rect x="30" y="45" width="300" height="30" fill="#1976d2" rx="5"/>
  <rect x="30" y="65" width="300" height="10" fill="#1976d2"/>
  <text x="180" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">STEP 导出结果 (.step)</text>
  
  <text x="45" y="95" font-family="monospace" font-size="9" fill="#333">ISO-10303-21;</text>
  <text x="45" y="108" font-family="monospace" font-size="9" fill="#333">HEADER;</text>
  <text x="45" y="121" font-family="monospace" font-size="9" fill="#333">  FILE_NAME('plate', ...);</text>
  <text x="45" y="134" font-family="monospace" font-size="9" fill="#333">ENDSEC;</text>
  <text x="45" y="147" font-family="monospace" font-size="9" fill="#333">DATA;</text>
  <text x="45" y="160" font-family="monospace" font-size="9" fill="#333">  #1 = CARTESIAN_POINT(...)</text>
  <text x="45" y="173" font-family="monospace" font-size="9" fill="#333">  #2 = DIRECTION(...)</text>
  <text x="45" y="186" font-family="monospace" font-size="9" fill="#333">  ...</text>
  <text x="45" y="199" font-family="monospace" font-size="9" fill="#333">END-ISO-10303-21;</text>
  
  <text x="180" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#1976d2" font-weight="bold">精确几何 + 拓扑信息</text>
  
  <!-- STL box -->
  <rect x="370" y="45" width="300" height="180" fill="#ffebee" stroke="#c62828" stroke-width="2" rx="5"/>
  <rect x="370" y="45" width="300" height="30" fill="#c62828" rx="5"/>
  <rect x="370" y="65" width="300" height="10" fill="#c62828"/>
  <text x="520" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">STL 导出结果 (.stl)</text>
  
  <text x="385" y="95" font-family="monospace" font-size="9" fill="#333">solid plate</text>
  <text x="385" y="108" font-family="monospace" font-size="9" fill="#333">  facet normal 0 0 1</text>
  <text x="385" y="121" font-family="monospace" font-size="9" fill="#333">    outer loop</text>
  <text x="385" y="134" font-family="monospace" font-size="9" fill="#333">      vertex 0 0 10</text>
  <text x="385" y="147" font-family="monospace" font-size="9" fill="#333">      vertex 100 0 10</text>
  <text x="385" y="160" font-family="monospace" font-size="9" fill="#333">      vertex 100 60 10</text>
  <text x="385" y="173" font-family="monospace" font-size="9" fill="#333">    endloop</text>
  <text x="385" y="186" font-family="monospace" font-size="9" fill="#333">  endfacet</text>
  <text x="385" y="199" font-family="monospace" font-size="9" fill="#333">  ... (~400 facets)</text>
  
  <text x="520" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#c62828" font-weight="bold">三角面片近似</text>
</svg>
