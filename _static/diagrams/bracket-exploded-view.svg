<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <rect width="900" height="460" fill="#f8f9fa" rx="10"/>

  <text x="450" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">支架装配体教学爆炸图（V8B）</text>

  <!-- 爆炸方向标注（左侧） -->
  <text x="50" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#666">↑ 爆炸方向</text>
  <line x1="50" y1="70" x2="50" y2="380" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- 装配顺序步骤（左侧编号） -->
  <circle cx="50" cy="120" r="12" fill="#1976d2" stroke="white" stroke-width="2"/>
  <text x="50" y="124" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">1</text>

  <circle cx="50" cy="200" r="12" fill="#388e3c" stroke="white" stroke-width="2"/>
  <text x="50" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">2</text>

  <circle cx="50" cy="280" r="12" fill="#f57c00" stroke="white" stroke-width="2"/>
  <text x="50" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">3</text>

  <circle cx="50" cy="360" r="12" fill="#c62828" stroke="white" stroke-width="2"/>
  <text x="50" y="364" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white">4</text>

  <!-- 组件 1: side_pin（最上方，销钉） -->
  <g transform="translate(180, 105)">
    <rect x="0" y="0" width="80" height="20" fill="#bdbdbd" stroke="#616161" stroke-width="2" rx="2"/>
    <text x="40" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">side_pin</text>
  </g>
  <text x="300" y="120" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">Φ6 × 15 mm</text>
  <text x="380" y="120" font-family="Arial, sans-serif" font-size="9" fill="#666">立板定位销</text>

  <!-- 拆解箭头（从销钉到立板） -->
  <line x1="220" y1="135" x2="220" y2="170" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="215,165 220,175 225,165" fill="#666"/>

  <!-- 组件 2: vertical_plate（立板） -->
  <g transform="translate(180, 180)">
    <rect x="0" y="0" width="80" height="40" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="2"/>
    <text x="40" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">vertical_plate</text>
    <circle cx="40" cy="20" r="4" fill="white" stroke="#388e3c" stroke-width="1"/>
  </g>
  <text x="300" y="200" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">40 × 100 × 10 mm</text>
  <text x="380" y="200" font-family="Arial, sans-serif" font-size="9" fill="#666">立板（与底板 L 型）</text>

  <!-- 拆解箭头（从立板到底板） -->
  <line x1="220" y1="225" x2="220" y2="260" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="215,255 220,265 225,255" fill="#666"/>

  <!-- 组件 3: mounting_bolt × 2（螺栓） -->
  <g transform="translate(180, 270)">
    <rect x="0" y="0" width="30" height="30" fill="#d7ccc8" stroke="#8d6e63" stroke-width="1.5" rx="1"/>
    <rect x="-2" y="-2" width="14" height="6" fill="#a1887f" stroke="#5d4037" stroke-width="1.5" rx="1"/>
    <text x="15" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">M8</text>
  </g>
  <g transform="translate(230, 270)">
    <rect x="0" y="0" width="30" height="30" fill="#d7ccc8" stroke="#8d6e63" stroke-width="1.5" rx="1"/>
    <rect x="-2" y="-2" width="14" height="6" fill="#a1887f" stroke="#5d4037" stroke-width="1.5" rx="1"/>
    <text x="15" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="white">M8</text>
  </g>
  <text x="300" y="290" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">2 × M8 螺栓</text>
  <text x="380" y="290" font-family="Arial, sans-serif" font-size="9" fill="#666">底板固定</text>

  <!-- 拆解箭头（从螺栓到底板） -->
  <line x1="220" y1="305" x2="220" y2="340" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <polygon points="215,335 220,345 225,335" fill="#666"/>

  <!-- 组件 4: base_plate（最下方，底板） -->
  <g transform="translate(180, 350)">
    <rect x="0" y="0" width="240" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="2" rx="2"/>
    <text x="120" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">base_plate</text>
    <circle cx="40" cy="15" r="3" fill="white" stroke="#1976d2" stroke-width="1"/>
    <circle cx="200" cy="15" r="3" fill="white" stroke="#1976d2" stroke-width="1"/>
  </g>
  <text x="450" y="370" font-family="Arial, sans-serif" font-size="10" fill="#333" font-weight="bold">200 × 10 × 60 mm</text>
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="9" fill="#666">底板（装配体地面）</text>

  <!-- 右侧：装配顺序说明 -->
  <rect x="600" y="60" width="280" height="50" fill="#fff" stroke="#90a4ae" stroke-width="1" rx="5"/>
  <text x="740" y="78" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">装配顺序（自下而上）</text>
  <text x="615" y="95" font-family="Arial, sans-serif" font-size="9" fill="#333">1 底板 → 2 立板 → 3 螺栓 → 4 销钉</text>

  <!-- 右侧：箭头方向说明 -->
  <rect x="600" y="125" width="280" height="40" fill="#fff" stroke="#90a4ae" stroke-width="1" rx="5"/>
  <text x="740" y="143" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">爆炸方向</text>
  <text x="615" y="158" font-family="Arial, sans-serif" font-size="9" fill="#333">垂直拉开，便于看清装配关系</text>

  <!-- 右侧：与 CAM 关系 -->
  <rect x="600" y="180" width="280" height="60" fill="#fff" stroke="#90a4ae" stroke-width="1" rx="5"/>
  <text x="740" y="198" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#2c3e50">与 CAM 关系</text>
  <text x="615" y="213" font-family="Arial, sans-serif" font-size="9" fill="#333">爆炸图用于理解关系，加工要</text>
  <text x="615" y="226" font-family="Arial, sans-serif" font-size="9" fill="#333">回到单件 STEP 生成 G-code</text>

  <!-- 底部 -->
  <rect x="20" y="395" width="860" height="50" fill="#fff" stroke="#90a4ae" stroke-width="1" rx="5"/>
  <text x="450" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">教学说明</text>
  <text x="40" y="432" font-family="Arial, sans-serif" font-size="9" fill="#333">• 爆炸图不是把零件真实拆开，而是教学性地拉开组件位置</text>
  <text x="450" y="432" font-family="Arial, sans-serif" font-size="9" fill="#333">• 间距要适度，便于看清关系；过近看不出，过远失去比例</text>
</svg>