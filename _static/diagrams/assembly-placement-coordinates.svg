<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#f8f9fa" rx="10"/>

  <text x="450" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">Assembly 坐标系与 Placement 关系图（V8C）</text>

  <!-- 全局坐标系（左侧） -->
  <g transform="translate(40, 70)">
    <text x="120" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1976d2">全局坐标系 Global</text>
    <!-- 装配体框架 -->
    <rect x="0" y="20" width="240" height="200" fill="#e3f2fd" stroke="#1976d2" stroke-width="2" rx="5"/>
    <!-- 全局原点 -->
    <circle cx="20" cy="200" r="5" fill="#c62828" stroke="white" stroke-width="2"/>
    <text x="20" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#c62828">(0,0,0)</text>
    <!-- X Y Z 坐标轴 -->
    <line x1="20" y1="200" x2="80" y2="200" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)"/>
    <text x="50" y="195" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#c62828">X</text>
    <line x1="20" y1="200" x2="20" y2="160" stroke="#388e3c" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="14" y="175" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#388e3c">Y</text>
    <!-- 底板（在全局坐标系中） -->
    <rect x="20" y="170" width="180" height="30" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5" rx="2"/>
    <text x="110" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#0d47a1">base_plate</text>
    <!-- 立板（在全局坐标系中） -->
    <rect x="190" y="60" width="20" height="110" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5" rx="2"/>
    <text x="220" y="115" font-family="Arial, sans-serif" font-size="9" fill="#1b5e20">vertical</text>
    <!-- 螺栓（在全局坐标系中） -->
    <circle cx="50" cy="155" r="4" fill="#d7ccc8" stroke="#5d4037" stroke-width="1"/>
    <circle cx="170" cy="155" r="4" fill="#d7ccc8" stroke="#5d4037" stroke-width="1"/>
    <text x="50" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#5d4037">bolt_L</text>
    <text x="170" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#5d4037">bolt_R</text>
  </g>

  <!-- 箭头：全局 → 局部 -->
  <line x1="290" y1="180" x2="320" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="305" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#666">loc</text>

  <!-- 零件局部坐标系（中间） -->
  <g transform="translate(330, 70)">
    <text x="120" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#388e3c">零件局部坐标系 Part Local</text>
    <rect x="0" y="20" width="240" height="200" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" rx="5"/>
    <!-- 底板局部坐标系 -->
    <g transform="translate(20, 170)">
      <rect x="0" y="0" width="180" height="30" fill="#c8e6c9" stroke="#388e3c" stroke-width="1" rx="2"/>
      <circle cx="0" cy="15" r="4" fill="#c62828" stroke="white" stroke-width="1"/>
      <text x="0" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#c62828">base local (0,0,0)</text>
    </g>
    <!-- 立板局部坐标系 -->
    <g transform="translate(190, 60)">
      <rect x="0" y="0" width="20" height="110" fill="#a5d6a7" stroke="#1b5e20" stroke-width="1" rx="2"/>
      <circle cx="10" cy="55" r="4" fill="#c62828" stroke="white" stroke-width="1"/>
      <text x="10" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#c62828">v local</text>
    </g>
    <text x="120" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">每个零件有自己的局部原点</text>
    <text x="120" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">由 Workplane 定义</text>
  </g>

  <!-- 箭头：局部 → Placement -->
  <line x1="580" y1="180" x2="610" y2="180" stroke="#666" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="595" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#666">+loc</text>

  <!-- Placement 表达（右侧） -->
  <g transform="translate(620, 70)">
    <text x="120" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f57c00">Assembly Location</text>
    <rect x="0" y="20" width="240" height="200" fill="#fff3e0" stroke="#f57c00" stroke-width="2" rx="5"/>
    <!-- placement 数据 -->
    <text x="10" y="40" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">PLACEMENT_TABLE = {</text>
    <text x="20" y="58" font-family="Arial, sans-serif" font-size="8" fill="#c62828">"base_plate"</text>
    <text x="90" y="58" font-family="Arial, sans-serif" font-size="8" fill="#333">: (0, 0, 0),</text>
    <text x="20" y="74" font-family="Arial, sans-serif" font-size="8" fill="#c62828">"vertical_plate"</text>
    <text x="100" y="74" font-family="Arial, sans-serif" font-size="8" fill="#333">: (20, 0, 95),</text>
    <text x="20" y="90" font-family="Arial, sans-serif" font-size="8" fill="#c62828">"bolt_left"</text>
    <text x="80" y="90" font-family="Arial, sans-serif" font-size="8" fill="#333">: (-50, 5, -15),</text>
    <text x="20" y="106" font-family="Arial, sans-serif" font-size="8" fill="#c62828">"bolt_right"</text>
    <text x="85" y="106" font-family="Arial, sans-serif" font-size="8" fill="#333">: (50, 5, -15),</text>
    <text x="20" y="122" font-family="Arial, sans-serif" font-size="8" fill="#c62828">"side_pin"</text>
    <text x="70" y="122" font-family="Arial, sans-serif" font-size="8" fill="#333">: (20, 5, 95),</text>
    <text x="10" y="140" font-family="Arial, sans-serif" font-size="8" fill="#333">}</text>
    <!-- 说明 -->
    <text x="120" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">所有 location 相对</text>
    <text x="120" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">全局原点 (0, 0, 0)</text>
    <text x="120" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-style="italic" fill="#f57c00">每行 = 一个组件的 placement</text>
  </g>

  <!-- 底部说明 -->
  <rect x="20" y="285" width="860" height="60" fill="#fff" stroke="#90a4ae" stroke-width="1" rx="5"/>
  <text x="450" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2c3e50">关键认识</text>
  <text x="40" y="325" font-family="Arial, sans-serif" font-size="10" fill="#333">• 全局原点是装配体的基准，所有 location 都以此为参考</text>
  <text x="40" y="340" font-family="Arial, sans-serif" font-size="10" fill="#333">• 每个零件有自己的局部原点，由 Workplane 定义</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#c62828"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#388e3c"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#666"/>
    </marker>
  </defs>
</svg>