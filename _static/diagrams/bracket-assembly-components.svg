<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" fill="#f8f9fa" rx="10"/>

  <text x="450" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">简化支架装配体组件图（V8A）</text>

  <!-- 装配体侧视图（中央）-->
  <g transform="translate(280, 70)">
    <!-- 底板（水平）-->
    <rect x="0" y="200" width="320" height="20" fill="#bbdefb" stroke="#1976d2" stroke-width="2" rx="2"/>
    <!-- 立板（垂直）-->
    <rect x="0" y="60" width="20" height="140" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="2"/>
    <!-- 底板 2 个螺栓（垂直贯穿）-->
    <rect x="60" y="195" width="6" height="35" fill="#d7ccc8" stroke="#8d6e63" stroke-width="1.5" rx="1"/>
    <rect x="56" y="190" width="14" height="6" fill="#a1887f" stroke="#5d4037" stroke-width="1.5" rx="1"/>
    <rect x="240" y="195" width="6" height="35" fill="#d7ccc8" stroke="#8d6e63" stroke-width="1.5" rx="1"/>
    <rect x="236" y="190" width="14" height="6" fill="#a1887f" stroke="#5d4037" stroke-width="1.5" rx="1"/>
    <!-- 销钉（水平贯穿立板）-->
    <rect x="6" y="125" width="20" height="6" fill="#bdbdbd" stroke="#616161" stroke-width="1.5" rx="1"/>
    <!-- 中心线（虚线）-->
    <line x1="-10" y1="120" x2="50" y2="120" stroke="#666" stroke-width="0.5" stroke-dasharray="3,3"/>
  </g>

  <!-- 标注线 + 标签（左侧：底板） -->
  <line x1="320" y1="280" x2="180" y2="380" stroke="#1976d2" stroke-width="1.5"/>
  <circle cx="320" cy="280" r="3" fill="#1976d2"/>
  <rect x="40" y="360" width="140" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="4"/>
  <text x="110" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d47a1">base_plate</text>
  <text x="110" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">200 x 10 x 60 mm</text>
  <text x="110" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">2 个 Φ8 孔</text>

  <!-- 标注线 + 标签（右上：立板） -->
  <line x1="290" y1="130" x2="450" y2="100" stroke="#388e3c" stroke-width="1.5"/>
  <circle cx="290" cy="130" r="3" fill="#388e3c"/>
  <rect x="450" y="80" width="140" height="50" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="4"/>
  <text x="520" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1b5e20">vertical_plate</text>
  <text x="520" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">40 x 100 x 10 mm</text>
  <text x="520" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1 个 Φ6 销钉孔</text>

  <!-- 标注线 + 标签（左中：螺栓） -->
  <line x1="345" y1="290" x2="180" y2="220" stroke="#8d6e63" stroke-width="1.5"/>
  <circle cx="345" cy="290" r="3" fill="#8d6e63"/>
  <rect x="40" y="200" width="140" height="50" fill="#efebe9" stroke="#8d6e63" stroke-width="1.5" rx="4"/>
  <text x="110" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#5d4037">mounting_bolt</text>
  <text x="110" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">2 个 M8 螺栓</text>
  <text x="110" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">教学示意</text>

  <!-- 标注线 + 标签（右中：销钉） -->
  <line x1="295" y1="180" x2="450" y2="220" stroke="#616161" stroke-width="1.5"/>
  <circle cx="295" cy="180" r="3" fill="#616161"/>
  <rect x="450" y="200" width="140" height="50" fill="#f5f5f5" stroke="#616161" stroke-width="1.5" rx="4"/>
  <text x="520" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#424242">side_pin</text>
  <text x="520" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">1 个 Φ6 销钉</text>
  <text x="520" y="246" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">教学示意</text>

  <!-- 底部说明 -->
  <rect x="20" y="200" width="40" height="40" fill="#ffebee" stroke="#c62828" stroke-width="1.5" rx="4"/>
  <text x="40" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#b71c1c">教学</text>
  <text x="40" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#555">示意</text>

</svg>