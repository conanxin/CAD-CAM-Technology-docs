<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <rect x="0" y="0" width="800" height="200" fill="#f8f9fa" rx="10"/>
  
  <text x="400" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">CAPP 工作流程</text>
  
  <rect x="20" y="60" width="120" height="80" fill="#3498db" rx="5" opacity="0.8"/>
  <text x="80" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">零件信息输入</text>
  <text x="80" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">几何/工艺信息</text>
  
  <rect x="160" y="60" width="120" height="80" fill="#2ecc71" rx="5" opacity="0.8"/>
  <text x="220" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">工艺路线设计</text>
  <text x="220" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">工序/工步排序</text>
  
  <rect x="300" y="60" width="120" height="80" fill="#e74c3c" rx="5" opacity="0.8"/>
  <text x="360" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">工序内容设计</text>
  <text x="360" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">设备/刀具/夹具</text>
  
  <rect x="440" y="60" width="120" height="80" fill="#f39c12" rx="5" opacity="0.8"/>
  <text x="500" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">工艺参数计算</text>
  <text x="500" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">切削用量/工时</text>
  
  <rect x="580" y="60" width="120" height="80" fill="#9b59b6" rx="5" opacity="0.8"/>
  <text x="640" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">工艺文档输出</text>
  <text x="640" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">工艺卡/工序卡</text>
  
  <rect x="720" y="60" width="70" height="80" fill="#1abc9c" rx="5" opacity="0.8"/>
  <text x="755" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="bold">NC</text>
  <text x="755" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white">代码输出</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34495e"/>
    </marker>
  </defs>
  
  <line x1="140" y1="100" x2="160" y2="100" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="280" y1="100" x2="300" y2="100" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="420" y1="100" x2="440" y2="100" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="560" y1="100" x2="580" y2="100" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="700" y1="100" x2="720" y2="100" stroke="#34495e" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <path d="M 755 140 Q 755 180 400 180 Q 80 180 80 140" stroke="#7f8c8d" stroke-width="1.5" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#7f8c8d">工艺数据库/知识库反馈</text>
</svg>