
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="200" y="20" font-size="14" text-anchor="middle" fill="#333" font-weight="bold">测试用立方体</text>
  
  <!-- 3D cube representation -->
  <!-- Front face -->
  <polygon points="120,180 220,180 220,80 120,80" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  
  <!-- Top face -->
  <polygon points="120,80 170,40 270,40 220,80" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
  
  <!-- Right face -->
  <polygon points="220,80 270,40 270,140 220,180" fill="#90caf9" stroke="#1976d2" stroke-width="1.5"/>
  
  <!-- Dimension lines -->
  <!-- Width -->
  <line x1="120" y1="210" x2="220" y2="210" stroke="#666" stroke-width="1"/>
  <line x1="120" y1="205" x2="120" y2="215" stroke="#666" stroke-width="1"/>
  <line x1="220" y1="205" x2="220" y2="215" stroke="#666" stroke-width="1"/>
  <text x="170" y="225" font-size="10" text-anchor="middle" fill="#333">10 mm</text>
  
  <!-- Height -->
  <line x1="90" y1="180" x2="90" y2="80" stroke="#666" stroke-width="1"/>
  <line x1="85" y1="180" x2="95" y2="180" stroke="#666" stroke-width="1"/>
  <line x1="85" y1="80" x2="95" y2="80" stroke="#666" stroke-width="1"/>
  <text x="75" y="135" font-size="10" text-anchor="middle" fill="#333" transform="rotate(-90,75,135)">10 mm</text>
  
  <!-- Depth -->
  <line x1="170" y1="40" x2="310" y2="40" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="270" y1="35" x2="270" y2="45" stroke="#666" stroke-width="1"/>
  <text x="290" y="35" font-size="10" text-anchor="start" fill="#333">10 mm</text>
  
  <!-- Info box -->
  <rect x="120" y="250" width="160" height="35" fill="#fff" stroke="#ddd" stroke-width="1" rx="3"/>
  <text x="200" y="265" font-size="10" text-anchor="middle" fill="#333">6 个面 | 12 条边 | 8 个顶点</text>
  <text x="200" y="278" font-size="9" text-anchor="middle" fill="#666">最简单的测试几何体</text>
</svg>
