<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <rect width="400" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="200" y="20" font-size="14" text-anchor="middle" fill="#333" font-weight="bold">G-code 程序执行流程</text>
  
  <!-- Flow boxes -->
  <rect x="120" y="40" width="160" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="200" y="60" font-size="10" text-anchor="middle" fill="#333">1. 程序开始</text>
  
  <rect x="120" y="80" width="160" height="30" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="200" y="100" font-size="10" text-anchor="middle" fill="#333">2. 主轴启动 (S2000 M3)</text>
  
  <rect x="120" y="120" width="160" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="200" y="140" font-size="10" text-anchor="middle" fill="#333">3. 快速定位 (G0)</text>
  
  <rect x="120" y="160" width="160" height="30" rx="4" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5"/>
  <text x="200" y="180" font-size="10" text-anchor="middle" fill="#333">4. 下刀 (G1 Z-5.)</text>
  
  <rect x="120" y="200" width="160" height="30" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="200" y="220" font-size="10" text-anchor="middle" fill="#333">5. 补偿建立 (G41 D1)</text>
  
  <rect x="120" y="240" width="160" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="200" y="260" font-size="10" text-anchor="middle" fill="#333">6. 轮廓切削 (G1)</text>
  
  <rect x="120" y="280" width="160" height="30" rx="4" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="200" y="300" font-size="10" text-anchor="middle" fill="#333">7. 补偿取消 (G40)</text>
  
  <rect x="120" y="320" width="160" height="30" rx="4" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="200" y="340" font-size="10" text-anchor="middle" fill="#333">8. 抬刀 (G0 Z50.)</text>
  
  <rect x="120" y="360" width="160" height="30" rx="4" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5"/>
  <text x="200" y="380" font-size="10" text-anchor="middle" fill="#333">9. 主轴停止 (M5)</text>
  
  <rect x="120" y="400" width="160" height="30" rx="4" fill="#fce4ec" stroke="#c2185b" stroke-width="1.5"/>
  <text x="200" y="420" font-size="10" text-anchor="middle" fill="#333">10. 回参考点 (G28)</text>
  
  <rect x="120" y="440" width="160" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="200" y="460" font-size="10" text-anchor="middle" fill="#333">11. 程序结束 (M30)</text>
  
  <!-- Arrows -->
  <line x1="200" y1="70" x2="200" y2="80" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,78 200,80 203,78" fill="#666"/>
  
  <line x1="200" y1="110" x2="200" y2="120" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,118 200,120 203,118" fill="#666"/>
  
  <line x1="200" y1="150" x2="200" y2="160" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,158 200,160 203,158" fill="#666"/>
  
  <line x1="200" y1="190" x2="200" y2="200" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,198 200,200 203,198" fill="#666"/>
  
  <line x1="200" y1="230" x2="200" y2="240" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,238 200,240 203,238" fill="#666"/>
  
  <line x1="200" y1="270" x2="200" y2="280" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,278 200,280 203,278" fill="#666"/>
  
  <line x1="200" y1="310" x2="200" y2="320" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,318 200,320 203,318" fill="#666"/>
  
  <line x1="200" y1="350" x2="200" y2="360" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,358 200,360 203,358" fill="#666"/>
  
  <line x1="200" y1="390" x2="200" y2="400" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,398 200,400 203,398" fill="#666"/>
  
  <line x1="200" y1="430" x2="200" y2="440" stroke="#666" stroke-width="1.5"/>
  <polygon points="197,438 200,440 203,438" fill="#666"/>
  
  <!-- Side note -->
  <text x="300" y="250" font-size="9" fill="#666" transform="rotate(90,300,250)">
    按程序顺序执行
  </text>
</svg>
