<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460">
  <rect width="900" height="460" fill="#f8f9fa" rx="10"/>

  <text x="450" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">L 型支架代码化特征映射（V7C）</text>

  <!-- 支架主体（侧视图） -->
  <g transform="translate(280, 70)">
    <!-- 立板（垂直）-->
    <rect x="0" y="0" width="50" height="280" fill="#c8e6c9" stroke="#388e3c" stroke-width="2" rx="2"/>
    <!-- 立板安装孔（2 个）-->
    <circle cx="25" cy="120" r="8" fill="white" stroke="#388e3c" stroke-width="1.5"/>
    <circle cx="25" cy="200" r="8" fill="white" stroke="#388e3c" stroke-width="1.5"/>

    <!-- 底板（水平）-->
    <rect x="0" y="280" width="500" height="25" fill="#bbdefb" stroke="#1976d2" stroke-width="2" rx="2"/>
    <!-- 底板安装孔（2 个）-->
    <circle cx="200" cy="292" r="10" fill="white" stroke="#1976d2" stroke-width="1.5"/>
    <circle cx="400" cy="292" r="10" fill="white" stroke="#1976d2" stroke-width="1.5"/>

    <!-- 内棱边圆角（底板和立板连接处）-->
    <path d="M 45,275 Q 50,280 55,280" fill="none" stroke="#7b1fa2" stroke-width="3"/>

    <!-- 中心线（虚线）-->
    <line x1="-20" y1="140" x2="80" y2="140" stroke="#666" stroke-width="0.5" stroke-dasharray="3,3"/>
    <line x1="250" y1="320" x2="250" y2="340" stroke="#666" stroke-width="0.5" stroke-dasharray="3,3"/>
  </g>

  <!-- 标注线 + 标签（左侧：立板） -->
  <line x1="280" y1="130" x2="180" y2="80" stroke="#388e3c" stroke-width="1.5"/>
  <circle cx="305" cy="130" r="3" fill="#388e3c"/>
  <rect x="40" y="60" width="140" height="60" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="4"/>
  <text x="110" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1b5e20">立板 vertical_plate</text>
  <text x="110" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">40 × 100 × 10 mm</text>
  <text x="110" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">立板高 = 100 mm</text>

  <!-- 标注线 + 标签（左侧：立板孔） -->
  <line x1="305" y1="190" x2="180" y2="180" stroke="#388e3c" stroke-width="1.5"/>
  <rect x="40" y="160" width="140" height="55" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="4"/>
  <text x="110" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1b5e20">vertical_holes</text>
  <text x="110" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">2 × Φ6 mm</text>
  <text x="110" y="207" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">间距 50 mm</text>

  <!-- 标注线 + 标签（底部：底板） -->
  <line x1="530" y1="365" x2="650" y2="420" stroke="#1976d2" stroke-width="1.5"/>
  <rect x="650" y="400" width="160" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="4"/>
  <text x="730" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d47a1">base_plate</text>
  <text x="730" y="434" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">200 × 40 × 10 mm</text>
  <text x="730" y="446" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">底板长 200 mm</text>

  <!-- 标注线 + 标签（底部：底板孔） -->
  <line x1="480" y1="362" x2="280" y2="430" stroke="#1976d2" stroke-width="1.5"/>
  <rect x="170" y="420" width="160" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="4"/>
  <text x="250" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#0d47a1">base_holes</text>
  <text x="250" y="454" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">2 × Φ8 mm, 间距 100 mm</text>

  <!-- 标注线 + 标签（中部：圆角） -->
  <line x1="335" y1="350" x2="450" y2="320" stroke="#7b1fa2" stroke-width="1.5"/>
  <rect x="430" y="290" width="160" height="50" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5" rx="4"/>
  <text x="510" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4a148c">fillet R3</text>
  <text x="510" y="324" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">内棱边圆角</text>
  <text x="510" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">(|Z or >X)</text>

  <!-- 标注线 + 标签（右上：倒角） -->
  <line x1="650" y1="100" x2="800" y2="80" stroke="#f57c00" stroke-width="1.5"/>
  <rect x="780" y="60" width="100" height="50" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5" rx="4"/>
  <text x="830" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#e65100">chamfer</text>
  <text x="830" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">0.5 × 45°</text>
  <text x="830" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#555">CAM 友好</text>

</svg>