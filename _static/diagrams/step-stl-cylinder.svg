
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280">
  <rect width="600" height="280" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="300" y="20" font-size="14" text-anchor="middle" fill="#333" font-weight="bold">圆柱体：STEP vs STL 精度对比</text>
  
  <!-- Left: STEP cylinder -->
  <rect x="30" y="40" width="170" height="220" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5" rx="3"/>
  <text x="115" y="58" font-size="11" text-anchor="middle" fill="#1976d2" font-weight="bold">STEP（精确圆柱）</text>
  
  <!-- Cylinder representation -->
  <ellipse cx="115" cy="90" rx="40" ry="12" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5"/>
  <line x1="75" y1="90" x2="75" y2="180" stroke="#1976d2" stroke-width="1.5"/>
  <line x1="155" y1="90" x2="155" y2="180" stroke="#1976d2" stroke-width="1.5"/>
  <ellipse cx="115" cy="180" rx="40" ry="12" fill="#90caf9" stroke="#1976d2" stroke-width="1.5"/>
  
  <!-- Description -->
  <text x="115" y="210" font-size="10" text-anchor="middle" fill="#333">CYLINDRICAL_SURFACE</text>
  <text x="115" y="225" font-size="9" text-anchor="middle" fill="#666">1 个数学方程</text>
  <text x="115" y="238" font-size="9" text-anchor="middle" fill="#666">半径 = 精确值</text>
  <text x="115" y="251" font-size="9" text-anchor="middle" fill="#666">侧面 = 完美光滑</text>
  
  <!-- Center: STL low precision -->
  <rect x="215" y="40" width="170" height="220" fill="#fff3e0" stroke="#f57c00" stroke-width="1.5" rx="3"/>
  <text x="300" y="58" font-size="11" text-anchor="middle" fill="#e65100" font-weight="bold">STL（低精度）</text>
  
  <!-- Low-poly cylinder -->
  <polygon points="260,90 270,85 285,88 295,95 300,105 295,115 285,122 270,125 260,122 250,115 245,105 250,95" fill="#ffe0b2" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="260" y1="90" x2="260" y2="180" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="270" y1="85" x2="270" y2="175" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="285" y1="88" x2="285" y2="178" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="295" y1="95" x2="295" y2="185" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="300" y1="105" x2="300" y2="195" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="295" y1="115" x2="295" y2="205" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="285" y1="122" x2="285" y2="212" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="270" y1="125" x2="270" y2="215" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="260" y1="122" x2="260" y2="212" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="250" y1="115" x2="250" y2="205" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="245" y1="105" x2="245" y2="195" stroke="#f57c00" stroke-width="1.5"/>
  <line x1="250" y1="95" x2="250" y2="185" stroke="#f57c00" stroke-width="1.5"/>
  <polygon points="260,180 270,175 285,178 295,185 300,195 295,205 285,212 270,215 260,212 250,205 245,195 250,185" fill="#ffcc80" stroke="#f57c00" stroke-width="1.5"/>
  
  <text x="300" y="235" font-size="10" text-anchor="middle" fill="#333">12 个三角形</text>
  <text x="300" y="248" font-size="9" text-anchor="middle" fill="#666">明显棱角（十二边形）</text>
  <text x="300" y="261" font-size="9" text-anchor="middle" fill="#666">最大偏差 ~1.5mm</text>
  
  <!-- Right: STL high precision -->
  <rect x="400" y="40" width="170" height="220" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5" rx="3"/>
  <text x="485" y="58" font-size="11" text-anchor="middle" fill="#2e7d32" font-weight="bold">STL（高精度）</text>
  
  <!-- High-poly cylinder (simplified visual) -->
  <ellipse cx="485" cy="90" rx="40" ry="12" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="445" y1="90" x2="445" y2="180" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="525" y1="90" x2="525" y2="180" stroke="#388e3c" stroke-width="1.5"/>
  <!-- Many small facets -->
  <line x1="450" y1="88" x2="450" y2="178" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="455" y1="87" x2="455" y2="177" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="460" y1="86" x2="460" y2="176" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="465" y1="85" x2="465" y2="175" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="470" y1="85" x2="470" y2="175" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="475" y1="85" x2="475" y2="175" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="480" y1="85" x2="480" y2="175" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="490" y1="85" x2="490" y2="175" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="495" y1="85" x2="495" y2="175" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="500" y1="86" x2="500" y2="176" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="505" y1="87" x2="505" y2="177" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="510" y1="88" x2="510" y2="178" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="515" y1="89" x2="515" y2="179" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <line x1="520" y1="89" x2="520" y2="179" stroke="#388e3c" stroke-width="0.5" stroke-dasharray="2,2"/>
  <ellipse cx="485" cy="180" rx="40" ry="12" fill="#a5d6a7" stroke="#388e3c" stroke-width="1.5"/>
  
  <text x="485" y="235" font-size="10" text-anchor="middle" fill="#333">100 个三角形</text>
  <text x="485" y="248" font-size="9" text-anchor="middle" fill="#666">接近圆形</text>
  <text x="485" y="261" font-size="9" text-anchor="middle" fill="#666">最大偏差 ~0.15mm</text>
  
  <!-- Bottom note -->
  <text x="300" y="275" font-size="10" text-anchor="middle" fill="#666">STL 精度与文件大小直接相关，但永远不是真正的数学圆柱</text>
</svg>
