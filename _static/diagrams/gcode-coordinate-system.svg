<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="200" y="20" font-size="14" text-anchor="middle" fill="#333" font-weight="bold">工件坐标系</text>
  
  <!-- Workpiece (rectangle) -->
  <rect x="100" y="80" width="200" height="160" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="200" y="170" font-size="12" text-anchor="middle" fill="#333">工件</text>
  
  <!-- Origin point -->
  <circle cx="100" cy="240" r="4" fill="#d32f2f"/>
  <text x="100" y="260" font-size="11" text-anchor="middle" fill="#d32f2f" font-weight="bold">工件原点 (G54)</text>
  
  <!-- X axis -->
  <line x1="100" y1="240" x2="320" y2="240" stroke="#333" stroke-width="2"/>
  <polygon points="320,235 330,240 320,245" fill="#333"/>
  <text x="340" y="245" font-size="12" fill="#333" font-weight="bold">X</text>
  
  <!-- Y axis -->
  <line x1="100" y1="240" x2="100" y2="60" stroke="#333" stroke-width="2"/>
  <polygon points="95,60 100,50 105,60" fill="#333"/>
  <text x="85" y="55" font-size="12" fill="#333" font-weight="bold">Y</text>
  
  <!-- Z axis (upward) -->
  <line x1="100" y1="240" x2="50" y2="190" stroke="#333" stroke-width="2" stroke-dasharray="4"/>
  <polygon points="48,192 45,185 53,188" fill="#333"/>
  <text x="35" y="185" font-size="12" fill="#333" font-weight="bold">Z</text>
  
  <!-- Z0 plane (top surface) -->
  <line x1="100" y1="80" x2="300" y2="80" stroke="#f57c00" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="320" y="85" font-size="10" fill="#f57c00">Z0 (工件上表面)</text>
  
  <!-- Z negative direction note -->
  <text x="200" y="280" font-size="10" text-anchor="middle" fill="#666">Z 负方向向下进入材料</text>
</svg>
